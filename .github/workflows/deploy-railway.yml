name: Deploy to Railway

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - solution

permissions:
  contents: read

concurrency:
  group: railway-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy with Railway CLI
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: npx -y @railway/cli up --ci

      - name: Missing Railway token
        if: ${{ env.RAILWAY_TOKEN == '' }}
        run: |
          echo "RAILWAY_TOKEN is not configured."
          echo "Add repository secret RAILWAY_TOKEN to enable deployment."
